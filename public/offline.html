<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Arkora</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff; font-family: system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px; text-align: center;
    }
    .container { max-width: 360px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    p { color: #9e9ea8; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #fff; color: #0a0a0a; border: none; padding: 12px 32px;
      border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're offline</h1>
    <p>Arkora needs an internet connection. Check your network and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
